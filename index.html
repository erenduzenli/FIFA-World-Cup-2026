<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #071634 0%, #020a1f 100%);
      color: white;
      min-height: 100vh;
    }
    .topbar {
      border-bottom: 2px solid #facc15;
      padding: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 50%;
      background: #0d1c40;
      padding: 6px;
    }
    .title {
      color: #facc15;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 0.2em;
      margin-top: 6px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }
    h1 {
      color: #facc15;
      font-size: 42px;
      margin: 8px 0;
      letter-spacing: 0.08em;
    }
    .desc {
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .card {
      border: 1px solid #27406f;
      border-radius: 16px;
      overflow: hidden;
      background: #091733;
    }
    .thead, .row {
      display: grid;
      grid-template-columns: 90px 1.8fr 1fr 1.3fr 1.3fr;
      align-items: center;
    }
    .thead {
      background: #0d1c40;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      border-bottom: 2px solid #facc15;
      padding: 14px 18px;
    }
    .row {
      padding: 18px;
      border-bottom: 1px solid #1b3059;
    }
    .row:last-child { border-bottom: none; }
    .points {
      color: #facc15;
      font-size: 28px;
      font-weight: 800;
    }
    .muted { color: #94a3b8; }
    .lock { color: #facc15; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="https://upload.wikimedia.org/wikipedia/en/d/d1/FIFA_World_Cup_2026_logo.svg" alt="FIFA World Cup 2026 logo" />
      <div>
        <div class="title">FIFA WORLD CUP 2026™</div>
        <div class="subtitle">USA · CANADA · MEXICO</div>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>LİG TABLOSU</h1>
    <div class="desc">Anlık puan sıralaması</div>

    <div class="card">
      <div class="thead">
        <div>#</div>
        <div>AD SOYAD</div>
        <div>PUAN</div>
        <div>ŞAMPİYON</div>
        <div>GOL KRALI</div>
      </div>

      <div class="row">
        <div>1</div>
        <div>Mert Alperten</div>
        <div class="points">0</div>
        <div class="muted">?</div>
        <div class="muted"><span class="lock">🔒</span>Gizli</div>
      </div>

      <div class="row">
        <div>2</div>
        <div>Şamil Yaşar</div>
        <div class="points">0</div>
        <div class="muted">?</div>
        <div class="muted"><span class="lock">🔒</span>Gizli</div>
      </div>

      <div class="row">
        <div>3</div>
        <div>Eren</div>
        <div class="points">0</div>
        <div class="muted">?</div>
        <div class="muted"><span class="lock">🔒</span>Gizli</div>
      </div>
    </div>
  </div>
</body>
</html>
